[build]
  functions = "netlify/functions"
  publish = "dist"

# Пререндер само за ботове
[[redirects]]
  from = "/"
  to = "/.netlify/functions/prerender"
  status = 200
  force = true
  conditions = { Header = ["User-Agent"] }

[[redirects]]
  from = "/blog"
  to = "/.netlify/functions/prerender"
  status = 200
  force = true
  conditions = { Header = ["User-Agent"] }

[[redirects]]
  from = "/blog/*"
  to = "/.netlify/functions/prerender"
  status = 200
  force = true
  conditions = { Header = ["User-Agent"] }

